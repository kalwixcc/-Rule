# made
# Last Modified: 2026/04/28 22:46:07
#----------------------订阅----------------------
proxy-providers:
  Made:
    url: "订阅机场"
    type: http
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 🇨🇳 DIRECT
#---------------------全局配置---------------------
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
find-process-mode: 'off'
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true
#---------------------面板---------------------
external-controller: 0.0.0.0:9090
secret: ""
external-ui: ui
external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"
#---------------------GeoX配置---------------------
geodata-mode: true   #>>格式:DAT/MMDB true/false
geodata-loader: standard  #>>标准加载器/优化加载器 standard/memconservative
#---------------------GEOX下载地址---------------------
geox-url:
  geosite: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
  mmdb: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.metadb
  geoip: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat
  asn: https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb
geo-auto-update: true
geo-update-interval: 24
#---------------------嗅探---------------------
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "+.push.apple.com"
#---------------------入站---------------------
tun:
  enable: true
  stack: mixed   #>>可选择 system/gvisor/mixed
  dns-hijack: ["any:53", "tcp://any:53"]
#>>使用仅内核自行修改下面三项为true
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
#---------------------DNS---------------------
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
    - +.tailscale.com
## 引导 DNS
  default-nameserver:
    - https://223.5.5.5/dns-query
## 代理服务器地址 DNS
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
## 兜底 DNS
#  nameserver:
#    - https://dns.alidns.com/dns-query
#    - https://doh.pub/dns-query
## 转发规则DNS
#nameserver-policy:
#  "geosite:geolocation-!cn":
#    - https://8.8.8.8/dns-query#🕹️Proxy
#    - https://cloudflare-dns.com/dns-query#🕹️Proxy
#---------------------
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://8.8.8.8/dns-query#RULES&ecs=223.5.5.0/24    
#---------------------节点------------------------
proxies:
- name: "🇨🇳 DIRECT"
  type: direct
  udp: true
#---------------------锚点---------------------
pr: &pr {type: select, proxies: [  🕹️Proxy, 🇨🇳 DIRECT], use: [订阅机场]}
#---------------------策略组---------------------
proxy-groups:
  - {name:  🕹️Proxy, type: select, proxies: [ 🃏Smart, 🇨🇳 DIRECT], use: [订阅机场]}
  - {name:  Apple, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Apple.png}
  - {name:  Spotify, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Spotify.png}
  - {name:  Speedtest, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Speedtest.png}
  - {name:  Microsoft, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Microsoft.png}
  - {name:  steam, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Steam.png}
  - {name:  AI, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/OpenAI.png}
  - {name:  PayPal, <<: *pr, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Paypal.png}
#  - {name:  ♾️Final, <<: *pr}
#>>自动测速
  - {name:  🃏Smart, type: url-test, include-all: false, tolerance: 100, interval:300, use: [订阅机场]],  filter: "AWS|IT7|DMIT"}
#>>自动回退
#  - {name:  🃏Smart, type: fallback, include-all: false, tolerance: 100, interval: 300, use: [Made],  filter: "AWS|IT7|DMIT"}
#---------------------规则匹配---------------------
rules:
#  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - DOMAIN-SUFFIX,tailscale.com,🇨🇳 DIRECT
  - IP-CIDR,192.168.2.0/24,🇨🇳 DIRECT
  - RULE-SET,private_ip,🇨🇳 DIRECT,no-resolve
  - RULE-SET,private_domain,🇨🇳 DIRECT
  - RULE-SET,proxylite, 🕹️Proxy
  - RULE-SET,apple_domain, Apple
  - RULE-SET,douyin,🇨🇳 DIRECT
  - RULE-SET,microsoft_domain, Microsoft
  - RULE-SET,ai, AI
  - RULE-SET,github_domain, 🕹️Proxy
  - RULE-SET,spotify_domain, Spotify
  - RULE-SET,youtube_domain, 🕹️Proxy
  - RULE-SET,google_domain, 🕹️Proxy
  - RULE-SET,speedtest_domain, Speedtest
  - RULE-SET,tiktok_domain, 🕹️Proxy
  - RULE-SET,telegram_domain, 🕹️Proxy
  - RULE-SET,paypal_domain, PayPal
  - RULE-SET,steam_domain, steam
  - RULE-SET,steam@cn_domain, steam
  - RULE-SET,apple_ip, Apple,no-resolve
  - RULE-SET,google_ip, 🕹️Proxy,no-resolve
  - RULE-SET,telegram_ip, 🕹️Proxy,no-resolve
  - RULE-SET,geolocation-!cn, 🕹️Proxy
  - RULE-SET,cn_domain,🇨🇳 DIRECT
  - RULE-SET,cn_ip,🇨🇳 DIRECT,no-resolve
  - MATCH, 🕹️Proxy

#---------------------规则锚点--------------------
## type：可选http/file/inline  behavior：可选domain/ipcidr/classical format：可选yaml/text/mrs
rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}
#---------------------域名类规则---------------------
rule-providers: 
  fakeipfilter_domain: {<<: *domain, url: "https://raw.githubusercontent.com/wwqgtxx/clash-rules/release/fakeip-filter.mrs"}
  private_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs"}
  proxylite: { <<: *class, url: "https://raw.githubusercontent.com/qichiyuhub/rule/refs/heads/main/rules/proxy.list"}
  ai: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ai-!cn.mrs" }
  youtube_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/youtube.mrs"}
  google_domain: { <<: *domain, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs"}
